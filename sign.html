<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - CampusChow</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/home.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f36767 0%, #ec737d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .signup-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signup-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .signup-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .signup-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #f8747f;
            box-shadow: 0 0 5px rgba(19, 172, 19, 0.2);
        }

        .password-requirements {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            font-weight: normal;
            font-size: 13px;
            cursor: pointer;
        }

        .signup-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #fc6c6c 0%, #e96a6a 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-bottom: 20px;
        }

        .signup-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .signup-btn:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #999;
        }

        .divider span {
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .divider p {
            padding: 0 10px;
            font-size: 14px;
        }

        .google-signup {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            color: #333;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .google-signup:hover {
            border-color: #667eea;
            background: #f8f8f8;
            box-shadow: 0 3px 10px rgba(102, 126, 234, 0.2);
        }

        .google-signup img {
            width: 20px;
            height: 20px;
            margin-right: 10px;
        }

        .login-link {
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .login-link a:hover {
            color: #764ba2;
        }

        .error-message {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .success-message {
            color: #27ae60;
            font-size: 13px;
            margin-top: 5px;
            display: none;
            text-align: center;
            padding: 10px;
            background: #ecfdf5;
            border-radius: 4px;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-header">
            <h1>Join CampusChow</h1>
            <p>Create your account to start ordering</p>
        </div>

        <form id="signupForm">
            <!-- Full Name -->
            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" name="fullName" placeholder="John Doe" required>
                <div class="error-message" id="nameError"></div>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
                <div class="error-message" id="emailError"></div>
            </div>

            <!-- Phone Number -->
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="+233 XXX XXX XXX" required>
                <div class="error-message" id="phoneError"></div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter strong password" required>
                <div class="password-requirements">
                    • At least 8 characters<br>
                    • Mix of uppercase, lowercase, and numbers
                </div>
                <div class="error-message" id="passwordError"></div>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password" required>
                <div class="error-message" id="confirmError"></div>
            </div>

            <!-- Terms & Conditions -->
            <div class="checkbox-group">
                <input type="checkbox" id="terms" name="terms" required>
                <label for="terms">I agree to the Terms & Conditions and Privacy Policy</label>
            </div>

            <!-- Loading Indicator -->
            <div class="loading" id="loadingIndicator">
                <div class="spinner"></div>
                Create account...
            </div>

            <!-- Success Message -->
            <div class="success-message" id="successMessage">
                Account created successfully! Redirecting...
            </div>

            <!-- Sign Up Button -->
            <button type="submit" class="signup-btn" id="signupBtn">Create Account</button>
        </form>

        <!-- Divider -->
        <div class="divider">
            <span></span>
            <p>or</p>
            <span></span>
        </div>

        <!-- Google Sign Up Button -->
        <div class="google-signup" id="googleSignupBtn"></div>

        <!-- Login Link -->
        <div class="login-link">
            Already have an account? <a href="signin.html">Sign In</a>
        </div>
    </div>

    <!-- Google Sign-In Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script>
        const API_BASE_URL = 'http://localhost:5000';

        // If already authenticated, skip auth pages and continue from home.
        if (localStorage.getItem('campusChowToken')) {
            window.location.href = 'index.html';
        }

        async function initializeGoogleSignUp() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/google-client-id`);
                const data = await response.json();

                if (data.clientId && window.google && window.google.accounts) {
                    google.accounts.id.initialize({
                        client_id: data.clientId,
                        callback: handleCredentialResponse
                    });

                    google.accounts.id.renderButton(
                        document.getElementById('googleSignupBtn'),
                        {
                            theme: 'outline',
                            size: 'large',
                            text: 'signup_with',
                            width: '320'
                        }
                    );
                } else {
                    document.getElementById('googleSignupBtn').innerHTML = '<p style="color:#999; font-size:12px; text-align:center; width:100%;">Google sign-up not configured</p>';
                }
            } catch (error) {
                console.error('Failed to initialize Google Sign-Up:', error);
                document.getElementById('googleSignupBtn').innerHTML = '<p style="color:#999; font-size:12px; text-align:center; width:100%;">Google sign-up unavailable</p>';
            }
        }

        window.onload = function() {
            initializeGoogleSignUp();
        };

        // Handle form submission
        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Clear previous error messages
            document.querySelectorAll('.error-message').forEach(el => {
                el.style.display = 'none';
            });

            // Get form values
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const termsAccepted = document.getElementById('terms').checked;

            // Validation
            let isValid = true;

            if (!fullName) {
                showError('nameError', 'Please enter your full name');
                isValid = false;
            }

            if (!email) {
                showError('emailError', 'Please enter a valid email address');
                isValid = false;
            } else if (!isValidEmail(email)) {
                showError('emailError', 'Please enter a valid email format');
                isValid = false;
            }

            if (!phone) {
                showError('phoneError', 'Please enter your phone number');
                isValid = false;
            }

            if (password.length < 8) {
                showError('passwordError', 'Password must be at least 8 characters');
                isValid = false;
            } else if (!isStrongPassword(password)) {
                showError('passwordError', 'Password must contain uppercase, lowercase, and numbers');
                isValid = false;
            }

            if (password !== confirmPassword) {
                showError('confirmError', 'Passwords do not match');
                isValid = false;
            }

            if (!termsAccepted) {
                showError('confirmError', 'You must accept the terms and conditions');
                isValid = false;
            }

            if (!isValid) return;

            // Show loading indicator
            showLoading();

            try {
                // Send signup request to backend
                const response = await fetch(`${API_BASE_URL}/api/auth/signup`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        fullName,
                        email,
                        phone,
                        password
                    })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    localStorage.setItem('campusChowToken', data.token);
                    localStorage.setItem('campusChowUser', JSON.stringify(data.user));

                    // Show success message
                    document.getElementById('successMessage').style.display = 'block';
                    document.getElementById('signupForm').style.display = 'none';
                    
                    // Redirect after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    showError('emailError', data.message || 'Signup failed. Please try again.');
                    hideLoading();
                }
            } catch (error) {
                console.error('Error:', error);
                showError('emailError', 'Network error. Please check your connection.');
                hideLoading();
            }
        });

        // Google Sign-In callback
        function handleCredentialResponse(response) {
            // Send token to backend
            fetch(`${API_BASE_URL}/api/auth/google-signup`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    token: response.credential
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    localStorage.setItem('campusChowToken', data.token);
                    localStorage.setItem('campusChowUser', JSON.stringify(data.user));
                    document.getElementById('successMessage').innerHTML = 'Google sign-up successful. Redirecting...';
                    document.getElementById('successMessage').style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    alert('Google signup failed: ' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred during Google sign-up');
            });
        }

        // Helper functions
        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        function isStrongPassword(password) {
            const hasUppercase = /[A-Z]/.test(password);
            const hasLowercase = /[a-z]/.test(password);
            const hasNumber = /[0-9]/.test(password);
            return hasUppercase && hasLowercase && hasNumber;
        }

        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = message;
            errorElement.style.display = 'block';
        }

        function showLoading() {
            document.getElementById('loadingIndicator').style.display = 'block';
            document.getElementById('signupBtn').disabled = true;
            document.getElementById('signupBtn').style.opacity = '0.6';
        }

        function hideLoading() {
            document.getElementById('loadingIndicator').style.display = 'none';
            document.getElementById('signupBtn').disabled = false;
            document.getElementById('signupBtn').style.opacity = '1';
        }
    </script>
</body>
</html>
