<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - CampusChow</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Poppins", sans-serif;
            background: radial-gradient(circle at top right, #ffe8cc, #d16d6dec 35%, #ce3636 65%, #f70303 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .signin-card {
            width: 100%;
            max-width: 440px;
            background: #ffffff;
            border-radius: 14px;
            padding: 36px;
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.18);
            animation: riseIn 0.45s ease;
        }

        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signin-header {
            text-align: center;
            margin-bottom: 26px;
        }

        .signin-header h1 {
            font-size: 30px;
            color: #2b2b2b;
            margin-bottom: 8px;
        }

        .signin-header p {
            color: #5f5f5f;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #2b2b2b;
            font-size: 14px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #ececec;
            border-radius: 7px;
            font-size: 14px;
            transition: border-color 0.25s, box-shadow 0.25s;
        }

        input:focus {
            outline: none;
            border-color: #f76707;
            box-shadow: 0 0 0 3px rgba(247, 103, 7, 0.15);
        }

        .signin-btn,
        .google-btn {
            width: 100%;
            padding: 12px;
            border-radius: 7px;
            border: none;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .signin-btn {
            background: #f76707;
            color: #fff;
            margin-top: 8px;
            margin-bottom: 18px;
        }

        .signin-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(247, 103, 7, 0.32);
        }

        .signin-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #8b8b8b;
            margin: 10px 0 16px;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #ececec;
        }

        .google-btn {
            background: #fff;
            color: #2b2b2b;
            border: 2px solid #e8e8e8;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            min-height: 40px;
        }

        .google-btn:hover {
            border-color: #f76707;
            box-shadow: 0 8px 18px rgba(247, 103, 7, 0.16);
        }

        #googleSigninBtn {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 18px;
        }
        
        #googleSigninBtn::after {
            content: '';
        }

        .error-text {
            font-size: 13px;
            color: #c92a2a;
            margin-top: 6px;
            min-height: 18px;
        }

        .success-text {
            font-size: 13px;
            color: #2b8a3e;
            background: #ebfbee;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 14px;
            display: none;
        }

        .footer-links {
            text-align: center;
            font-size: 14px;
            color: #555;
        }

        .footer-links a {
            color: #f76707;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .signin-card {
                padding: 26px;
            }

            .signin-header h1 {
                font-size: 26px;
            }
        }
    </style>
</head>
<body>
    <div class="signin-card">
        <div class="signin-header">
            <h1>Welcome Back</h1>
            <p>Sign in to continue ordering on CampusChow</p>
        </div>

        <div class="success-text" id="successText"></div>

        <form id="signinForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <div class="error-text" id="errorText"></div>

            <button type="submit" class="signin-btn" id="signinBtn">Sign In</button>
        </form>

        <div class="divider">or</div>

        <div id="googleSigninBtn" class="google-btn"></div>

        <div class="footer-links">
            New here? <a href="sign.html">Create an account</a><br>
            <a href="index.html">Back to home</a>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        const API_BASE_URL = 'http://localhost:5000';

        // If already authenticated, continue from home.
        if (localStorage.getItem('campusChowToken')) {
            window.location.href = 'index.html';
        }

        const signinForm = document.getElementById('signinForm');
        const signinBtn = document.getElementById('signinBtn');
        const errorText = document.getElementById('errorText');
        const successText = document.getElementById('successText');
        const googleSigninBtn = document.getElementById('googleSigninBtn');

        // Fetch Google Client ID from backend and initialize
        async function initializeGoogleSignIn() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/auth/google-client-id`);
                const data = await response.json();
                
                if (data.clientId && window.google && window.google.accounts) {
                    google.accounts.id.initialize({
                        client_id: data.clientId,
                        callback: handleGoogleCredential
                    });
                    
                    // Render the official Google Sign-In button
                    google.accounts.id.renderButton(
                        document.getElementById('googleSigninBtn'),
                        { 
                            theme: 'outline', 
                            size: 'large',
                            text: 'continue_with',
                            width: '280'
                        }
                    );
                } else if (!data.clientId) {
                    console.warn('Google Client ID not configured on server');
                    document.getElementById('googleSigninBtn').innerHTML = '<p style="color: #999; font-size: 12px;">Google Sign-In not configured</p>';
                }
            } catch (error) {
                console.error('Failed to initialize Google Sign-In:', error);
                document.getElementById('googleSigninBtn').innerHTML = '<p style="color: #999; font-size: 12px;">Google Sign-In unavailable</p>';
            }
        }

        window.onload = function () {
            initializeGoogleSignIn();
        };

        signinForm.addEventListener('submit', async function (event) {
            event.preventDefault();
            clearMessages();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showError('Please enter your email and password.');
                return;
            }

            try {
                setLoading(true);

                const response = await fetch(`${API_BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok || !data.success) {
                    showError(data.message || 'Sign in failed. Please try again.');
                    return;
                }

                localStorage.setItem('campusChowToken', data.token);
                localStorage.setItem('campusChowUser', JSON.stringify(data.user));
                showSuccess('Sign in successful. Redirecting...');

                setTimeout(function () {
                    window.location.href = 'index.html';
                }, 1200);
            } catch (error) {
                console.error(error);
                showError('Network error. Make sure the backend is running on port 5000.');
            } finally {
                setLoading(false);
            }
        });



        function handleGoogleCredential(response) {
            clearMessages();

            fetch(`${API_BASE_URL}/api/auth/google-signup`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ token: response.credential })
            })
            .then(function (res) { return res.json(); })
            .then(function (data) {
                if (!data.success) {
                    showError(data.message || 'Google sign-in failed.');
                    return;
                }

                localStorage.setItem('campusChowToken', data.token);
                localStorage.setItem('campusChowUser', JSON.stringify(data.user));
                showSuccess('Google sign-in successful. Redirecting...');
                setTimeout(function () {
                    window.location.href = 'index.html';
                }, 1200);
            })
            .catch(function (error) {
                console.error(error);
                showError('Google sign-in failed. Please try again.');
            });
        }

        function setLoading(isLoading) {
            signinBtn.disabled = isLoading;
            signinBtn.textContent = isLoading ? 'Signing In...' : 'Sign In';
        }

        function clearMessages() {
            errorText.textContent = '';
            successText.style.display = 'none';
            successText.textContent = '';
        }

        function showError(message) {
            errorText.textContent = message;
        }

        function showSuccess(message) {
            successText.textContent = message;
            successText.style.display = 'block';
        }
    </script>
</body>
</html>
